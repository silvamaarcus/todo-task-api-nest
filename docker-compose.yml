version: '3'

services:
  postgres:
    image: postgres
    container_name: todo_nest_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: todo_nest
    ports:
      - '5433:5432'
    volumes:
      - ./.postgres-data:/var/lib/postgresql

  postgres-test:
    image: postgres
    container_name: todo_nest_db_test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: todo_nest
    ports:
      - '5434:5432'
    volumes:
      - ./.postgres-test-data:/var/lib/postgresql
